# Per-worker private RSS measured at ~40Mi peak (RssAnon from /proc/<pid>/status).
# With limits.memory=3Gi (prod) minus ~300Mi shared/safety, 40 workers fit:
#   40 * 60Mi (peak + headroom) + 300Mi shared = 2700Mi
#
# Same config on test (limits.memory=1Gi): test traffic is low, worker count
# stays well below the spare pool ceiling. Load behavior is validated in prod.
#
#   ServerLimit / MaxRequestWorkers = 40
#     Hard cap. Prevents OOM cascade when slow MySQL queries (Redis cache
#     failure) cause Apache to spawn workers until pod memory limit is hit.
#   MaxConnectionsPerChild = 1000
#     Recycle workers to mitigate memory leaks in long-lived PHP processes
#     (WP plugins, WPML, GraphQL).
#   MaxSpareServers = 15
#     Above default (10) to absorb bursts without spawning new processes on
#     every request. ~600Mi private + shared, fits within prod 3Gi.
<IfModule mpm_prefork_module>
    StartServers             5
    MinSpareServers          5
    MaxSpareServers          15
    ServerLimit              40
    MaxRequestWorkers        40
    MaxConnectionsPerChild   1000
</IfModule>
